<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#0b0f14;color:#f3f6f8;font-family:Segoe UI,Microsoft YaHei,Arial,sans-serif;display:grid;place-items:center;padding:16px}.app{display:grid;grid-template-columns:minmax(260px,340px) minmax(320px,434px);gap:18px;align-items:start}.panel,.game{background:#131a22;border:1px solid #31404e;border-radius:8px;box-shadow:0 18px 42px #0008}.panel{padding:22px;display:grid;gap:14px}h1{margin:0;font-size:clamp(2rem,5vw,3.2rem);line-height:1.05}.eyebrow{margin:0;color:#f0c766;text-transform:uppercase;font-size:12px;font-weight:700}.summary,.controls{color:#a5b1bd;line-height:1.5}.status{display:inline-flex;width:max-content;padding:8px 12px;border-radius:8px;background:#37c6a324;color:#37c6a3;font-weight:700}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card{background:#1c2530;border:1px solid #ffffff12;border-radius:8px;padding:12px}.label{font-size:12px;color:#a5b1bd;text-transform:uppercase}.value{font-size:28px;font-weight:800;margin-top:4px}.game{padding:14px;position:relative}canvas{display:block;width:100%;height:auto;border-radius:8px;background:#0d141c}.overlay{position:absolute;inset:14px;display:grid;place-items:center;text-align:center;background:#070a0dc7;border-radius:8px}.overlay.hidden{display:none}.overlay h2{margin:0;font-size:34px}.buttons{margin-top:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.buttons button{min-height:44px;border:1px solid #31404e;border-radius:8px;background:#1b2631;color:#f3f6f8;font:inherit;font-weight:700}@media(max-width:860px){.app{grid-template-columns:1fr}.panel{order:2}.game{width:min(calc(100vw - 32px),434px)}}

<body>
<div class="app">
<aside class="panel">
<div><p class="eyebrow">Block Stack</p><h1>&#x4FC4;&#x7F57;&#x65AF;&#x65B9;&#x5757;</h1><p class="summary">&#x952E;&#x76D8;&#x548C;&#x89E6;&#x63A7;&#x90FD;&#x53EF;&#x4EE5;&#x73A9;&#x3002;&#x6D88;&#x884C;&#x5347;&#x7EA7;&#xFF0C;&#x901F;&#x5EA6;&#x4F1A;&#x9010;&#x6B65;&#x52A0;&#x5FEB;&#x3002;</p></div>

<div class="stats"><div class="card"><div class="label">&#x5206;&#x6570;</div><div id="score" class="value">0</div></div><div class="card"><div class="label">&#x7B49;&#x7EA7;</div><div id="level" class="value">1</div></div><div class="card"><div class="label">&#x884C;&#x6570;</div><div id="lines" class="value">0</div></div><div class="card"><div class="label">&#x6700;&#x9AD8;&#x5206;</div><div id="best" class="value">0</div></div></div>
<div class="card controls">Enter &#x5F00;&#x59CB; / P &#x6682;&#x505C; / R &#x91CD;&#x5F00;<br>&larr;&rarr; &#x79FB;&#x52A8; / &uarr; &#x65CB;&#x8F6C; / &darr; &#x8F6F;&#x964D; / Space &#x786C;&#x964D;</div>

<main><div class="game"><canvas id="game" width="360" height="720"></canvas><div id="overlay" class="overlay"><div><h2>&#x4FC4;&#x7F57;&#x65AF;&#x65B9;&#x5757;</h2><p>&#x6309; Enter &#x6216;&#x70B9; Start</p></div></div></div><div class="buttons"><button data-a="left">&larr;</button><button data-a="right">&rarr;</button><button data-a="rotate">&#x21BB;</button><button data-a="down">&darr;</button><button data-a="drop">Drop</button><button data-a="pause">Pause</button><button data-a="restart">Restart</button><button data-a="start">Start</button></div></main>

<script>
const W=10,H=20,B=36,PIECES='IJLOSTZ'.split(''),C={I:'#62d6ff',J:'#5186ff',L:'#ffa552',O:'#ffd866',S:'#73e074',T:'#bf7cff',Z:'#ff6f7d'},S={I:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],[[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]],J:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]],L:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]],O:[[[1,0],[2,0],[1,1],[2,1]]],S:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]],[[1,1],[2,1],[0,2],[1,2]],[[0,0],[0,1],[1,1],[1,2]]],T:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]],Z:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[1,2],[2,2]],[[1,0],[0,1],[1,1],[0,2]]]};
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('score'),levelEl=document.getElementById('level'),linesEl=document.getElementById('lines'),bestEl=document.getElementById('best'),statusEl=document.getElementById('status'),overlay=document.getElementById('overlay');let board,active,queue,score,level,lines,status='waiting',timer=0,last=0,best=Number(localStorage.tetrisBest||0);
function bag(){let a=[...PIECES];for(let i=a.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}function cells(p){return S[p.t][p.r%S[p.t].length].map(([x,y])=>[p.x+x,p.y+y])}function hit(p){return cells(p).some(([x,y])=>x<0||x>=W||y>=H||(y>=0&&board[y][x]))}function spawn(){if(queue.length<7)queue.push(...bag());active={t:queue.shift(),r:0,x:3,y:-1};if(hit(active))gameOver()}function reset(){board=Array.from({length:H},()=>Array(W).fill(null));queue=bag();score=lines=0;level=1;status='playing';timer=0;spawn();overlay.classList.add('hidden')}function gameOver(){status='gameover';best=Math.max(best,score);localStorage.tetrisBest=best;overlay.classList.remove('hidden')}function lock(){for(const[x,y]of cells(active)){if(y<0)return gameOver();board[y][x]=active.t}let kept=board.filter(r=>r.some(v=>!v)),n=H-kept.length;if(n){board=[...Array.from({length:n},()=>Array(W).fill(null)),...kept];lines+=n;level=1+(lines/10|0);score+=([0,100,300,500,800][n]||0)*level}spawn()}function move(dx){let p={...active,x:active.x+dx};if(!hit(p))active=p}function rotate(){let p={...active,r:active.r+1},ok=[0,-1,1,-2,2].map(k=>({...p,x:p.x+k})).find(q=>!hit(q));if(ok)active=ok}function down(){let p={...active,y:active.y+1};hit(p)?lock():active=p;score++}function drop(){let n=0;while(!hit({...active,y:active.y+1})){active.y++;n++}score+=n*2;lock()}function pause(){if(status==='playing'){status='paused';overlay.classList.remove('hidden')}else if(status==='paused'){status='playing';overlay.classList.add('hidden')}}function drawBlock(x,y,color,a=1){ctx.globalAlpha=a;ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x*B+1,y*B+1,B-3,B-3,8);ctx.fill();ctx.globalAlpha=1}function draw(){ctx.clearRect(0,0,360,720);for(let y=0;y<H;y++)for(let x=0;x<W;x++){drawBlock(x,y,'#0d1c25');if(board[y][x])drawBlock(x,y,C[board[y][x]])}if(active){let g={...active};while(!hit({...g,y:g.y+1}))g.y++;cells(g).forEach(([x,y])=>y>=0&&drawBlock(x,y,C[g.t],.22));cells(active).forEach(([x,y])=>y>=0&&drawBlock(x,y,C[active.t]))}scoreEl.textContent=score||0;levelEl.textContent=level||1;linesEl.textContent=lines||0;bestEl.textContent=Math.max(best,score||0);statusEl.textContent=status==='playing'?'\u8fdb\u884c\u4e2d':status==='paused'?'\u5df2\u6682\u505c':status==='gameover'?'\u6e38\u620f\u7ed3\u675f':'\u5f85\u5f00\u59cb'}function loop(t){let d=t-last;last=t;if(status==='playing'){timer+=d;let interval=Math.max(100,820-(level-1)*65);if(timer>interval){timer=0;let p={...active,y:active.y+1};hit(p)?lock():active=p}}draw();requestAnimationFrame(loop)}function act(a){if(a==='start'&&(status==='waiting'||status==='gameover'))reset();else if(a==='restart')reset();else if(a==='pause')pause();else if(status==='playing'){if(a==='left')move(-1);if(a==='right')move(1);if(a==='rotate')rotate();if(a==='down')down();if(a==='drop')drop()}}addEventListener('keydown',e=>{let m={Enter:'start',r:'restart',R:'restart',p:'pause',P:'pause',ArrowLeft:'left',ArrowRight:'right',ArrowUp:'rotate',ArrowDown:'down',' ':'drop'}[e.key];if(m){e.preventDefault();act(m)}});document.querySelectorAll('button').forEach(b=>b.onclick=()=>act(b.dataset.a));board=Array.from({length:H},()=>Array(W).fill(null));requestAnimationFrame(loop);
</script>
